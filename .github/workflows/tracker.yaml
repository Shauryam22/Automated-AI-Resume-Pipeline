name: Track New Public Repos

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

permissions:
  contents: write # Needed to commit the updated JSON file
  issues: write   # Needed to open the issue

jobs:
  check-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Tracker Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/tracker.py

      - name: Commit and Push Updated Resume
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.tex
          
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "AI Auto-inject project into resume"
            git fetch origin main
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi