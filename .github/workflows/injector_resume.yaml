name: Inject Resume Updates

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-resume:
    # Only run if the issue is an open issue (not a PR) and the comment author is the repository owner
    if: ${{ !github.event.issue.pull_request && github.event.comment.user.login == github.repository_owner }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Injector Script
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: python scripts/injector.py

      - name: Commit and Push Updated Resume
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.tex
          # Only commit if the python script actually changed the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-inject project into resume" && git push)

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --reason "completed"