name: Inject Resume Updates

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-resume:
    if: ${{ !github.event.issue.pull_request && github.event.comment.user.login == github.repository_owner }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # NEW: Install the Gemini SDK
      - name: Install Dependencies
        run: pip install google-genai

      # - name: Run AI Injector Script
      #   env:
      #     COMMENT_BODY: ${{ github.event.comment.body }}
      #     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # NEW: Pass the key to Python
      #   run: python scripts/injector.py
      - name: Run AI Injector Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python -u scripts/injector.py
       
      - name: Commit and Push Updated Resume
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.tex
          
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "AI Auto-inject project into resume"
            git fetch origin main
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --reason "completed"
      - name: Run AI Injector Script
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }} # NEW: Grabs the bot's original text
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/injector.py

      # ... (Your previous step that pushes to main is right above this)

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          # Note: This action spins up a full LaTeX environment. 
          # It might add ~1 minute to your total workflow time.

      - name: Send PDF to Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "AI Bot: Your Resume has been Updated!"
          to: ${{ secrets.RECEIVER_EMAIL }}
          from: GitHub Actions Bot
          body: "Your Zero-Touch CI/CD pipeline successfully detected a new project, wrote the LaTeX bullet points, and compiled the updated resume. The PDF is attached!"
          attachments: resume.pdf