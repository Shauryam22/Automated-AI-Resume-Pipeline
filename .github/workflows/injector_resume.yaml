name: Inject Resume Updates

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-resume:
    if: ${{ !github.event.issue.pull_request && github.event.comment.user.login == github.repository_owner }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # NEW: Install the Gemini SDK
      - name: Install Dependencies
        run: pip install google-generativeai

      - name: Run AI Injector Script
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # NEW: Pass the key to Python
        run: python scripts/injector.py

      - name: Commit and Push Updated Resume
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.tex
          git diff --quiet && git diff --staged --quiet || (git commit -m "AI Auto-inject project into resume" && git push)

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --reason "completed"
      - name: Run AI Injector Script
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }} # NEW: Grabs the bot's original text
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/injector.py