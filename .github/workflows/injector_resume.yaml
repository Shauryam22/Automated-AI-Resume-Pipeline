name: Global Resume Auto-Updater

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

permissions:
  contents: write 
  issues: write 

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        # Added google-genai here so the AI can run
        run: pip install requests google-genai

      - name: Run Global Radar Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Added Gemini API Key here so it has access
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # NOTE: Make sure your python file is named injector.py (or change this line to tracker.py)
        run: python scripts/injector.py

      - name: Commit and Push Updated Resume
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.tex
          
          # Check if there are changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "AI Auto-inject project into resume"
            git fetch origin main
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Send PDF to Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 AI Bot: Your Resume has been Updated!"
          to: ${{ secrets.RECEIVER_EMAIL }}
          from: GitHub Actions Bot
          body: "Your Global Radar detected a new project, wrote the LaTeX bullet points, and compiled the updated resume. The PDF is attached!"
          attachments: resume.pdf